<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#8a2be2"/>
    </linearGradient>
  </defs>

  <!-- rounded tile -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bg)"/>
  <rect x="4.5" y="4.5" width="119" height="119" rx="25.5" fill="none"
        stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>

  <!-- shield: integrity / tamper-evidence -->
  <path d="M64 24 L94 36 V62 C94 82 81 96 64 104 C47 96 34 82 34 62 V36 Z"
        fill="none" stroke="url(#accent)" stroke-width="5"
        stroke-linejoin="round"/>

  <!-- hash chain inside the shield -->
  <g fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round">
    <rect x="50" y="44" width="20" height="13" rx="6.5"/>
    <rect x="58" y="58" width="20" height="13" rx="6.5"/>
    <rect x="50" y="72" width="20" height="13" rx="6.5"/>
  </g>

  <!-- "pq" mark -->
  <text x="64" y="120" text-anchor="middle"
        font-family="monospace" font-size="13" font-weight="bold"
        fill="#14b8a6" opacity="0.85">pq</text>
</svg>
